name: inventory_scanner
description: A professional inventory scanner app converted from native Android.
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  get: ^4.7.3
  http: ^1.6.0
  path_provider: ^2.1.5
  path: ^1.9.1
  internet_connection_checker_plus: ^2.9.1+2
  intl: ^0.20.2
  logger: ^2.7.0

  drift: 2.31.0
  sqlite3_flutter_libs: 0.5.42
  google_fonts: 6.3.2
  cupertino_icons: 1.0.8
  device_info_plus: 12.4.0
  shared_preferences: 2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  drift_dev: 2.31.0
  build_runner: ^2.13.1
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
