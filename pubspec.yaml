name: inventory_scanner
description: A professional inventory scanner app converted from native Android.
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  get: ^4.7.3
  http: ^1.6.0
  drift: ^2.16.0
  sqlite3_flutter_libs: ^0.5.20
  path_provider: ^2.1.2
  path: ^1.9.0
  shared_preferences: ^2.2.2
  internet_connection_checker_plus: ^2.5.1
  intl: ^0.19.0
  logger: ^2.0.2+1
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.7
  device_info_plus: ^10.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  drift_dev: ^2.16.0
  build_runner: ^2.4.8
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
